<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Archivieren</title>
    <h:outputScript>
        function resizeArchivierenWindow() {
            /* your existing resize logic here */
        }
    </h:outputScript>
</h:head>

<h:body>
<ui:composition template="/templates/mainTemplateWithoutForm.xhtml">
<ui:define name="content">

    <!--
        f:event PreRenderViewEvent → f:event (unchanged, standard JSF)
        af:clientListener type="load" → inline script at bottom of form
        af:form → h:form  (usesUpload maps to enctype multipart)
        af:resource type="javascript" → h:outputScript / inline script
    -->
    <f:event type="jakarta.faces.event.PreRenderViewEvent"
             listener="#{archivierenVC.preRenderView}"/>

    <h:form id="archivForm"
            enctype="#{archivierenVC.archivierenModell.upload ? 'multipart/form-data' : 'application/x-www-form-urlencoded'}">

        <!-- ═══════════════════════════════════════════════════════
             DIALOG 1: Archivierung ausgeführt
             af:popup + af:dialog → p:dialog
             NO binding attribute (avoids duplicate-ID with @Dependent)
             widgetVar used instead so bean can call PrimeFaces.current().executeScript(...)
        ═══════════════════════════════════════════════════════ -->
        <p:dialog id="dlgArchivierungAusgefuehrt"
                  widgetVar="dlgArchivierungAusgefuehrtWV"
                  header="IMS: Hinweis"
                  modal="true"
                  closable="false"
                  resizable="false"
                  width="280">
            <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
                <h:outputText id="outArchivHinweis"
                              value="Das Dokument wurde archiviert."/>
                <p:commandButton id="btnArchivOk"
                                 value="OK"
                                 action="#{archivierenVC.beendenFenster}"
                                 process="@this"
                                 update="@form"/>
            </div>
        </p:dialog>

        <!-- ═══════════════════════════════════════════════════════
             DIALOG 2: ORB existiert nicht
        ═══════════════════════════════════════════════════════ -->
        <p:dialog id="dlgOrbExistiertNicht"
                  widgetVar="dlgOrbExistiertNichtWV"
                  header="IMS"
                  modal="true"
                  closable="false"
                  resizable="false"
                  width="280">
            <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
                <h:outputText id="outOrbError"
                              value="#{archivierenVC.archivierenModell.errorORBMessage}"/>
                <div style="display:flex; gap:15px;">
                    <p:commandButton id="btnOrbOk"
                                     value="OK"
                                     style="width:100px;"
                                     action="#{archivierenVC.errorORBAnlegen}"
                                     process="@this"
                                     update="@form"/>
                    <p:commandButton id="btnOrbAbbrechen"
                                     value="Abbrechen"
                                     style="width:100px;"
                                     action="#{archivierenVC.errorORBAbrechen}"
                                     process="@this"
                                     update="@form"/>
                </div>
            </div>
        </p:dialog>

        <!-- ═══════════════════════════════════════════════════════
             PANEL: Fenster konnte nicht geschlossen werden
             h:panelGroup rendered → p:outputPanel (stable ID wrapper)
        ═══════════════════════════════════════════════════════ -->
        <p:outputPanel id="pnlFensterSchliessen">
            <p:outputPanel id="pnlFensterSchliessenInner"
                           rendered="#{archivierenVC.fensterSchliessen}">
                <div style="display:flex;">
                    <h:outputText id="outFensterHinweis"
                                  style="font-weight:bold;"
                                  value="Hinweis: Das Fenster konnte nicht automatisch geschlossen werden. Bitte schliessen Sie es manuell."/>
                </div>
            </p:outputPanel>
        </p:outputPanel>

        <!-- ═══════════════════════════════════════════════════════
             PANEL: Ungültige Mail-Parameter / Fehler
             trh:script → inline h:outputScript
             af:clientListener type="click" → onclick on p:commandButton
        ═══════════════════════════════════════════════════════ -->
        <p:outputPanel id="pnlInvalidMailOuter">
            <p:outputPanel id="pnlInvalidMail"
                           rendered="#{archivierenVC.invalidMailParams and !archivierenVC.fensterSchliessen}">
                <h:outputScript>
                    function fensterSchliessen() { window.close(); }
                </h:outputScript>
                <div style="display:flex;">
                    <h:outputText id="outFehlerTitel"
                                  style="font-weight:bold;"
                                  value="Beim Aufbau der Seite ist ein Fehler aufgetreten."/>
                </div>
                <div style="margin-top:25px; display:flex; gap:15px;">
                    <h:outputText id="outBeschreibungLabel"
                                  style="font-weight:bold;"
                                  value="Beschreibung:"/>
                    <h:outputText id="outErrorMessage"
                                  value="#{archivierenVC.archivierenModell.errorMessage}"/>
                </div>
                <div style="margin-top:25px;">
                    <!--
                        af:clientListener method="fensterSchliessen" type="click"
                        → onclick attribute on p:commandButton
                        immediate="true" so no validation runs
                    -->
                    <p:commandButton id="btnFensterSchliessen"
                                     value="OK"
                                     onclick="fensterSchliessen(); return false;"
                                     type="button"/>
                </div>
            </p:outputPanel>
        </p:outputPanel>

        <!-- ═══════════════════════════════════════════════════════
             MAIN CONTENT PANEL
             rendered="#{!fensterSchliessen and not invalidMailParams}"
             Wrapped in stable p:outputPanel to avoid duplicate-ID
        ═══════════════════════════════════════════════════════ -->
        <p:outputPanel id="pnlMainOuter">
        <p:outputPanel id="pnlMain"
                       rendered="#{!archivierenVC.fensterSchliessen and not archivierenVC.invalidMailParams}">

            <div id="page">
                <div style="margin-top:10px;"/>
                <div id="main">

                    <!--
                        trh:tableLayout / trh:rowLayout / trh:cellFormat
                        → HTML table (safest 1:1 replacement preserving column spans)
                    -->
                    <table cellspacing="7" style="width:100%;">

                        <!-- ROW 1: Mandant / ORB-Art / ORB  (visible only when not upload) -->
                        <tr>
                            <td colspan="6">
                                <!--
                                    af:panelGroupLayout visible="..." → p:outputPanel rendered="..."
                                    wrapped in stable outer panel
                                -->
                                <p:outputPanel id="pnlMandantOuter" layout="block">
                                    <p:outputPanel id="pnlMandant" layout="inline"
                                                   rendered="#{!archivierenVC.archivierenModell.upload}">
                                        <div style="display:flex; gap:8px; align-items:center;">

                                            <!--
                                                af:selectOneChoice immediate="true" autoSubmit="true"
                                                valueChangeListener → p:selectOneMenu + p:ajax event="change"
                                            -->
                                            <p:outputLabel id="lblMandant" for="selMandant" value="Mandant:"/>
                                            <p:selectOneMenu id="selMandant"
                                                             styleClass="imsfieldsmall"
                                                             value="#{archivierenVC.archivierenModell.mandant}">
                                                <p:ajax id="ajxMandant"
                                                        event="change"
                                                        listener="#{archivierenVC.mandantValueChangeListener}"
                                                        process="@this"
                                                        update="@form"/>
                                                <f:selectItems id="mandantItems"
                                                               value="#{archivierenVC.archivierenModell.mandantItems}"/>
                                            </p:selectOneMenu>

                                            <p:outputLabel id="lblOrbart" for="selOrbart" value="ORB-Art:"/>
                                            <!--
                                                partialTriggers="selMandant" → update= handled by p:ajax above
                                                updating @form covers all dependent components
                                            -->
                                            <p:selectOneMenu id="selOrbart"
                                                             styleClass="imsfieldsmall"
                                                             value="#{archivierenVC.archivierenModell.orbArt}">
                                                <p:ajax id="ajxOrbart"
                                                        event="change"
                                                        listener="#{archivierenVC.orbArtValueChangeListener}"
                                                        process="@this"
                                                        update="@form"/>
                                                <f:selectItems id="orbartItems"
                                                               value="#{archivierenVC.archivierenModell.orbartItems}"/>
                                            </p:selectOneMenu>

                                            <p:outputLabel id="lblOrb" for="inpOrb" value="ORB:"/>
                                            <!--
                                                af:inputText autoSubmit="true" → p:inputText + p:ajax event="change"
                                                columns/maximumLength → style width + maxlength
                                            -->
                                            <p:inputText id="inpOrb"
                                                         style="width:120px;"
                                                         maxlength="24"
                                                         value="#{archivierenVC.archivierenModell.orb}">
                                                <p:ajax id="ajxOrb"
                                                        event="change"
                                                        process="@this"
                                                        update="@form"/>
                                            </p:inputText>

                                        </div>
                                    </p:outputPanel>
                                </p:outputPanel>
                            </td>
                            <td><!-- empty cell (commented-out checkbox preserved) --></td>
                        </tr>

                        <!-- ROW 2: File upload (only when upload=true) -->
                        <tr>
                            <td colspan="7">
                                <p:outputPanel id="pnlUploadOuter" layout="block">
                                    <p:outputPanel id="pnlUpload" layout="inline"
                                                   rendered="#{archivierenVC.archivierenModell.upload}">
                                        <div style="display:flex; gap:8px; align-items:center;">
                                            <p:outputLabel id="lblDokument" value="Dokument:"/>
                                            <!--
                                                h:inputFile rendered="#{archivierenVC.renderInputFile}"
                                                → p:outputPanel wrapper + h:inputFile (JSF standard file input)
                                                p:fileUpload is an option but h:inputFile matches original exactly
                                            -->
                                            <p:outputPanel id="pnlInputFileOuter" layout="inline">
                                                <h:inputFile id="file"
                                                             size="75"
                                                             rendered="#{archivierenVC.renderInputFile}"
                                                             value="#{archivierenVC.archivierenModell.file}"/>
                                            </p:outputPanel>
                                            <h:outputText id="outFileName"
                                                          value="#{archivierenVC.archivierenModell.fileName}"/>
                                            <p:outputPanel id="pnlDateiLoeschenOuter" layout="inline">
                                                <p:commandButton id="cmdDateiLoeschen"
                                                                 value="Datei löschen"
                                                                 rendered="#{!archivierenVC.renderInputFile}"
                                                                 action="#{archivierenVC.dateiLoeschen}"
                                                                 process="@this"
                                                                 update="@form"/>
                                            </p:outputPanel>
                                        </div>
                                    </p:outputPanel>
                                </p:outputPanel>
                            </td>
                        </tr>

                        <!-- SEPARATOR -->
                        <tr><td colspan="7"><hr/></td></tr>

                        <!-- ROW 3: VgNr / Neuen Vorgang anlegen / Vorgangsart -->
                        <tr>
                            <td colspan="2">
                                <!--
                                    af:inputText disabled / validator / valueChangeListener / partialTriggers
                                    → p:inputText + validator + p:ajax
                                    partialTriggers="selectVorgangAnlegen" → update="@form" from that component's ajax covers this
                                -->
                                <p:inputText id="mailVgNrAnzeigeId"
                                             style="width:58px;"
                                             maxlength="4"
                                             disabled="#{archivierenVC.archivierenModell.neuenVorgangAnlegen}"
                                             value="#{archivierenVC.archivierenModell.vgNummer}">
                                    <f:validator validatorId="#{archivierenVC.validateVgNr}"/>
                                    <p:ajax id="ajxVgNr"
                                            event="change"
                                            listener="#{archivierenVC.vgNrValueChangeListener}"
                                            process="@this"
                                            update="@form"/>
                                </p:inputText>
                            </td>

                            <td>
                                <!--
                                    af:selectBooleanCheckbox immediate="true" autoSubmit="true"
                                    → p:selectBooleanCheckbox + p:ajax event="change"
                                -->
                                <p:selectBooleanCheckbox id="selectVorgangAnlegen"
                                                         value="#{archivierenVC.archivierenModell.neuenVorgangAnlegen}">
                                    <p:ajax id="ajxVorgangAnlegen"
                                            event="change"
                                            listener="#{archivierenVC.neueVorgangValueChangeListener}"
                                            process="@this"
                                            update="@form"/>
                                </p:selectBooleanCheckbox>
                            </td>
                            <td style="text-align:left;">
                                <p:outputLabel id="lblNeuenVorgang"
                                               value="Neuen Vorgang anlegen:"
                                               for="selectVorgangAnlegen"/>
                            </td>

                            <td colspan="2">
                                <p:outputLabel id="lblVgArt" value="Vorgangsart:" for="mailVgArtId"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="mailVgArtId"
                                                 styleClass="imsfieldlarge"
                                                 disabled="#{!archivierenVC.archivierenModell.neuenVorgangAnlegen}"
                                                 value="#{archivierenVC.archivierenModell.vgArt}">
                                    <p:ajax id="ajxVgArt"
                                            event="change"
                                            listener="#{archivierenVC.vgArtValueChangeListener}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="vgArtItems"
                                                   value="#{archivierenVC.archivierenModell.vgArtItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <!-- SEPARATOR -->
                        <tr><td colspan="7"><hr/></td></tr>

                        <!-- ROW 4: Eingangsdatum / Dokumentenklasse -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblEingangsDat" value="Eingangsdatum:" for="inpEingangsDatum"/>
                            </td>
                            <td colspan="2">
                                <!--
                                    af:inputDate + af:validateDateTimeRange
                                    → p:datePicker + f:validator or p:ajax with maximum
                                    p:calendar is the classic PrimeFaces date input
                                -->
                                <p:datePicker id="inpEingangsDatum"
                                              styleClass="datumfeld"
                                              value="#{archivierenVC.archivierenModell.eintragDatum}"
                                              maxdate="#{archivierenVC.eingangsdatumMaxDate}">
                                    <p:ajax id="ajxEingangsDatum" event="dateSelect" update="@form"/>
                                </p:datePicker>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblDokuKl" value="Dokumentenklasse:"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="selDokukl"
                                                 styleClass="imsfieldlarge"
                                                 value="#{archivierenVC.archivierenModell.eintragDokuKl}">
                                    <p:ajax id="ajxDokuKl"
                                            event="change"
                                            listener="#{archivierenVC.dokuKlValueChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="dokuKlItems"
                                                   value="#{archivierenVC.archivierenModell.eintragDokuKlItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <!-- ROW 5: Textkurzverweis / Anlassgeber -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblTkv" value="Textkurzverweis:" for="selTkv"/>
                            </td>
                            <td colspan="2">
                                <p:selectOneMenu id="selTkv"
                                                 styleClass="imsfieldmedium"
                                                 value="#{archivierenVC.archivierenModell.eintragTextkurzverweis}">
                                    <p:ajax id="ajxTkv"
                                            event="change"
                                            listener="#{archivierenVC.eintragTextkurzverweisChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="tkvItems"
                                                   value="#{archivierenVC.archivierenModell.eintragTextkvItems}"/>
                                </p:selectOneMenu>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblAnlassgeber" value="Anlassgeber/Empfänger:"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="selAnlassgeber"
                                                 styleClass="imsfieldlarge"
                                                 value="#{archivierenVC.archivierenModell.eintragAnlassgeber}">
                                    <p:ajax id="ajxAnlassgeber"
                                            event="change"
                                            listener="#{archivierenVC.eintragAnlassgeberChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="anlassgeberItems"
                                                   value="#{archivierenVC.archivierenModell.eintragAnlassgeberItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <!-- ROW 6: Medium / Berechtigung Dokument -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblMedium" value="Medium:"/>
                            </td>
                            <td colspan="2">
                                <p:selectOneMenu id="selMedium"
                                                 styleClass="imsfieldmedium"
                                                 value="#{archivierenVC.archivierenModell.eintragMedium}">
                                    <p:ajax id="ajxMedium"
                                            event="change"
                                            listener="#{archivierenVC.eintragMediumChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="mediumItems"
                                                   value="#{archivierenVC.archivierenModell.mediumItems}"/>
                                </p:selectOneMenu>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblBerechtigungDok" value="Berechtigung Dokument:"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="selBerechtigungDok"
                                                 styleClass="imsfieldlarge"
                                                 value="#{archivierenVC.archivierenModell.eintragBerechtigungDok}">
                                    <p:ajax id="ajxBerechtigungDok"
                                            event="change"
                                            listener="#{archivierenVC.eintragBerechtigungDokChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="berechtigungItems"
                                                   value="#{archivierenVC.archivierenModell.eintragBerechtigungItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <!-- ROW 7: IndividuellerText (rowSpan=2) -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblIndivText" value="IndividuellerText:"/>
                            </td>
                            <td colspan="5" rowspan="2">
                                <!--
                                    af:inputText rows="3" columns="85" → p:inputTextarea
                                -->
                                <p:inputTextarea id="txtIndivText"
                                                 cols="85"
                                                 rows="3"
                                                 maxlength="200"
                                                 styleClass="imsfieldlarge"
                                                 value="#{archivierenVC.archivierenModell.indivText}"/>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblIndivTextHint" value="(max. 200 Zeichen)"/>
                            </td>
                        </tr>

                        <!-- SEPARATOR -->
                        <tr><td colspan="7"><hr/></td></tr>

                        <!-- ROW 8: Termin erzeugen / Termindatum / Abteilung -->
                        <tr>
                            <td>
                                <p:selectBooleanCheckbox id="selectTerminErzeugen"
                                                         value="#{archivierenVC.archivierenModell.terminErzeugen}">
                                    <p:ajax id="ajxTerminErzeugen"
                                            event="change"
                                            process="@this"
                                            update="@form"/>
                                </p:selectBooleanCheckbox>
                            </td>
                            <td style="text-align:left; white-space:nowrap;">
                                <p:outputLabel id="lblTerminErzeugen"
                                               value="Termin erzeugen:"
                                               for="selectTerminErzeugen"/>
                            </td>
                            <td colspan="2">
                                <p:datePicker id="inpTerminDatum"
                                              styleClass="datumfeld"
                                              label="Termindatum:"
                                              value="#{archivierenVC.archivierenModell.terminDatum}"
                                              disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                              mindate="#{archivierenVC.minimumDate}">
                                    <p:ajax id="ajxTerminDatum" event="dateSelect" update="@form"/>
                                </p:datePicker>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblAbtlg" value="Abteilung:" for="inpAbtlg"/>
                            </td>
                            <td>
                                <p:inputText id="inpAbtlg"
                                             styleClass="imsfieldsmall"
                                             disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                             value="#{archivierenVC.archivierenModell.terminAbteilung}"/>
                            </td>
                        </tr>

                        <!-- ROW 9: Terminart / Gruppe -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblTerminArt" value="Terminart:" for="selTerminArt"/>
                            </td>
                            <td colspan="2">
                                <p:selectOneMenu id="selTerminArt"
                                                 styleClass="imsfieldmedium"
                                                 disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                                 value="#{archivierenVC.archivierenModell.terminArt}">
                                    <p:ajax id="ajxTerminArt"
                                            event="change"
                                            listener="#{archivierenVC.terminartValueChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="terminArtItems"
                                                   value="#{archivierenVC.archivierenModell.terminArtItems}"/>
                                </p:selectOneMenu>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblGrp" value="Gruppe:" for="inpGrp"/>
                            </td>
                            <td>
                                <p:inputText id="inpGrp"
                                             styleClass="imsfieldsmall"
                                             disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                             value="#{archivierenVC.archivierenModell.terminGruppe}"/>
                            </td>
                        </tr>

                        <!-- ROW 10: Termingrund / Diktat-Kz -->
                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblTermingrund" value="Termingrund:" for="selTermingrund"/>
                            </td>
                            <td colspan="2">
                                <p:selectOneMenu id="selTermingrund"
                                                 styleClass="imsfieldmedium"
                                                 disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                                 value="#{archivierenVC.archivierenModell.termingrund}">
                                    <p:ajax id="ajxTermingrund"
                                            event="change"
                                            listener="#{archivierenVC.termingrundValueChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="terminGrundItems"
                                                   value="#{archivierenVC.archivierenModell.terminGrundItems}"/>
                                </p:selectOneMenu>
                            </td>
                            <td colspan="2">
                                <p:outputLabel id="lblDikKz" value="Diktat-Kz:" for="inpDikKz"/>
                            </td>
                            <td>
                                <p:inputText id="inpDikKz"
                                             styleClass="imsfieldsmall"
                                             disabled="#{!archivierenVC.archivierenModell.terminErzeugen}"
                                             value="#{archivierenVC.archivierenModell.terminDiktatKz}"/>
                            </td>
                        </tr>

                        <!-- SEPARATOR -->
                        <tr><td colspan="7"><hr/></td></tr>

                        <!-- ROW 11: Kopieren zu weiteren ORB + Termine erzeugen -->
                        <tr>
                            <td>
                                <p:selectBooleanCheckbox id="selectKopiereZuOrb"
                                                         disabled="#{archivierenVC.archivierenModell.serienBrief}"
                                                         value="#{archivierenVC.archivierenModell.kopiereZuOrb}">
                                    <p:ajax id="ajxKopiereZuOrb"
                                            event="change"
                                            listener="#{archivierenVC.kopierenZuWeiterenORB}"
                                            process="@this"
                                            update="@form"/>
                                </p:selectBooleanCheckbox>
                            </td>
                            <td colspan="3" style="text-align:left;">
                                <p:outputLabel id="lblKopiereZuOrb"
                                               value="Kopieren zu weiteren Ordnungsbegriffen"/>
                            </td>
                            <td colspan="3">
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <p:selectBooleanCheckbox id="selectTermineErzeugen"
                                                             disabled="#{(!archivierenVC.archivierenModell.terminErzeugen) || (!archivierenVC.archivierenModell.kopiereZuOrb) || (archivierenVC.archivierenModell.serienBrief)}"
                                                             value="#{archivierenVC.archivierenModell.termineErzeugen}"/>
                                    <p:outputLabel id="lblTermineErzeugen" value="Termine erzeugen"/>
                                </div>
                            </td>
                        </tr>

                        <!-- ROW 12: Ziel-Tabelle (rowspan 7) + ORB-Eingabe-Felder -->
                        <tr>
                            <td colspan="4" rowspan="7" style="vertical-align:top;">
                                <!--
                                    af:table → p:dataTable
                                    rowSelection="single" + selectedRowKeys → selectionMode + selection
                                    NO binding attribute
                                -->
                                <p:dataTable id="tabZielList"
                                             var="zielItem"
                                             value="#{archivierenVC.archivierenModell.zielList}"
                                             selectionMode="single"
                                             selection="#{archivierenVC.archivierenModell.zielRowKeySet}"
                                             rowKey="#{zielItem.orb}"
                                             emptyMessage="Keine Dokumente ausgewählt."
                                             styleClass="imsORBTable">
                                    <p:column id="colZielMA" headerText="MA" width="45" style="white-space:nowrap;">
                                        <h:outputText id="outZielMA" value="#{zielItem.mandant}"/>
                                    </p:column>
                                    <p:column id="colZielOrbArt" headerText="ORB-Art" width="140" style="white-space:nowrap;">
                                        <h:outputText id="outZielOrbArt" value="#{zielItem.orbArt}"/>
                                    </p:column>
                                    <p:column id="colZielOrb" headerText="ORB" width="140" style="white-space:nowrap;">
                                        <h:outputText id="outZielOrb" value="#{zielItem.orb}"/>
                                    </p:column>
                                    <p:column id="colZielVgNr" headerText="VG-Nr" width="65" style="white-space:nowrap;">
                                        <h:outputText id="outZielVgNr" value="#{zielItem.vgNr}"/>
                                    </p:column>
                                </p:dataTable>
                            </td>

                            <!-- Mandant Umb -->
                            <td colspan="2">
                                <p:outputLabel id="lblMandantUmb" value="Mandant:" for="selMandantUmb"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="selMandantUmb"
                                                 styleClass="imsfieldsmall"
                                                 disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                                 value="#{archivierenVC.archivierenModell.umbAktuellerEintrag.mandant}">
                                    <p:ajax id="ajxMandantUmb"
                                            event="change"
                                            listener="#{archivierenVC.mandantUmbChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="umbMandantItems"
                                                   value="#{archivierenVC.archivierenModell.umbMandantItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblOrbartUmb" value="ORB-Art:" for="selOrbartUmb"/>
                            </td>
                            <td>
                                <p:selectOneMenu id="selOrbartUmb"
                                                 styleClass="imsfieldsmall"
                                                 disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                                 value="#{archivierenVC.archivierenModell.umbAktuellerEintrag.orbArt}">
                                    <p:ajax id="ajxOrbartUmb"
                                            event="change"
                                            listener="#{archivierenVC.orbartUmbChangeMethod}"
                                            process="@this"
                                            update="@form"/>
                                    <f:selectItems id="umbOrbartItems"
                                                   value="#{archivierenVC.archivierenModell.umbOrbartItems}"/>
                                </p:selectOneMenu>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblOrbUmb" value="ORB:"/>
                            </td>
                            <td>
                                <p:inputText id="selOrbUmb"
                                             style="width:125px;"
                                             disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                             value="#{archivierenVC.archivierenModell.umbAktuellerEintrag.orb}"/>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2">
                                <p:outputLabel id="lblVgNrUmb" value="VG-Nr.:"/>
                            </td>
                            <td>
                                <p:inputText id="selVgNrUmb"
                                             style="width:55px;"
                                             disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                             value="#{archivierenVC.archivierenModell.umbAktuellerEintrag.vgNr}"/>
                            </td>
                        </tr>

                        <!-- Hinzufügen / Löschen buttons -->
                        <tr>
                            <td colspan="3" style="text-align:center;">
                                <p:commandButton id="cmdHinzufuegen"
                                                 value="Hinzufügen"
                                                 title="Ziel hinzufügen"
                                                 disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                                 actionListener="#{archivierenVC.actionHinzufuegen}"
                                                 process="@form"
                                                 update="@form"/>
                                <p:commandButton id="cmdLoeschen"
                                                 value="Löschen"
                                                 title="Ziel entfernen"
                                                 style="margin-left:10px;"
                                                 disabled="#{!archivierenVC.archivierenModell.kopiereZuOrb}"
                                                 action="#{archivierenVC.removeRow}"
                                                 process="@this"
                                                 update="@form"/>
                            </td>
                        </tr>

                        <!-- Serienbrief row (only when upload=true) -->
                        <tr>
                            <td colspan="3">
                                <p:outputPanel id="pnlSerienbriefOuter" layout="block">
                                    <p:outputPanel id="pnlSerienbrief" layout="inline"
                                                   rendered="#{archivierenVC.archivierenModell.upload}">
                                        <div style="display:flex; gap:8px; align-items:center;">
                                            <p:selectBooleanCheckbox id="selSerienbrief"
                                                                      disabled="#{archivierenVC.archivierenModell.kopiereZuOrb}"
                                                                      value="#{archivierenVC.archivierenModell.serienBrief}">
                                                <p:ajax id="ajxSerienbrief"
                                                        event="change"
                                                        process="@this"
                                                        update="@form"/>
                                            </p:selectBooleanCheckbox>
                                            <p:outputLabel id="lblSerienbrief" value="Serienbrief"/>
                                        </div>
                                    </p:outputPanel>
                                </p:outputPanel>
                            </td>
                        </tr>

                        <!-- placeholder row to complete rowspan=7 -->
                        <tr><td colspan="3"></td></tr>

                        <!-- ROW: Statustext -->
                        <tr>
                            <td colspan="7">
                                <!--
                                    af:inputText disabled="true" → p:inputText readonly
                                    partialTriggers → updated automatically via update="@form" from other components
                                -->
                                <p:inputText id="statusText"
                                             style="width:750px; color:black;"
                                             readonly="true"
                                             value="#{archivierenVC.archivierenModell.statustext}"/>
                            </td>
                        </tr>

                        <!-- ROW: Ausführen / Abbrechen -->
                        <tr>
                            <td colspan="6" style="text-align:center;">
                                <p:commandButton id="cmdArchivieren"
                                                 value="Ausführen"
                                                 title="Ausführen"
                                                 actionListener="#{archivierenVC.archivierungAusfuehren}"
                                                 process="@form"
                                                 update="@form"/>
                                <p:commandButton id="cmdAbbrechen"
                                                 value="Abbrechen"
                                                 title="Abbrechen"
                                                 style="margin-left:10px;"
                                                 actionListener="#{archivierenVC.archivierungAbbrechen}"
                                                 process="@this"
                                                 update="@form"/>
                            </td>
                        </tr>

                    </table><!-- end trh:tableLayout -->

                    <!-- ═══════════════════════════════════════════════════════
                         DIALOG 3: Sicherheitsabfrage (ORB anlegen?)
                         NO binding — widgetVar used instead
                         Bean opens it via: PrimeFaces.current().executeScript("PF('dlgSicherheitsabfrageWV').show();")
                    ═══════════════════════════════════════════════════════ -->
                    <p:dialog id="dlgSicherheitsabfrage"
                              widgetVar="dlgSicherheitsabfrageWV"
                              header="Sind Sie sicher?"
                              modal="true"
                              closable="false"
                              resizable="false"
                              width="420">
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <h:outputText id="outSicherheitsFrage"
                                          value="Der Ordnungsbegriff '#{archivierenVC.archivierenModell.umbAktuellerEintrag.orb}' existiert nicht! Soll er angelegt werden?"/>
                            <div style="display:flex; gap:15px; justify-content:center; margin-top:10px;">
                                <p:commandButton id="cmdSicherheitOk"
                                                 value="OK"
                                                 style="width:100px;"
                                                 action="#{archivierenVC.fuegeZielHinzu}"
                                                 process="@this"
                                                 update="@form"
                                                 oncomplete="PF('dlgSicherheitsabfrageWV').hide();"/>
                                <p:commandButton id="cmdSicherheitCancel"
                                                 value="Abbrechen"
                                                 style="width:100px;"
                                                 action="#{archivierenVC.doNothing}"
                                                 process="@this"
                                                 update="@form"
                                                 oncomplete="PF('dlgSicherheitsabfrageWV').hide();"/>
                            </div>
                        </div>
                    </p:dialog>

                </div><!-- end #main -->
            </div><!-- end #page -->

            <!-- af:messages → p:messages -->
            <p:messages id="msgs" showDetail="true" showSummary="true"/>

        </p:outputPanel>
        </p:outputPanel><!-- end pnlMain / pnlMainOuter -->

        <!--
            af:clientListener type="load" method="resizeWindowOnLoad"
            → inline script that runs on DOMContentLoaded
        -->
        <h:outputScript>
            document.addEventListener('DOMContentLoaded', function() {
                if (!#{archivierenVC.archivierenModell.upload}) {
                    resizeArchivierenWindow();
                }
            });
        </h:outputScript>

    </h:form>

</ui:define>
<ui:define name="footer">
</ui:define>
</ui:composition>
</h:body>
</html>
